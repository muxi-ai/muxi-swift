name: Swift SDK CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions: {}

jobs:
  test:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build
        run: swift build

      - name: Test
        run: swift test
